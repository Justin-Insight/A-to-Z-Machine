baseURL = "https://a-to-z-machine.netlify.app/"
languageCode = "en-us"
title = "A to Z Machine"
enableRobotsTXT = true
disableAliases = true
googleAnalytics = "G-0692372BX5"
# post pagination
paginate = "9"
summaryLength = 30
timeout = 200000

#################### default parameters ################################

[params]
  logo = "/images/a-to-z-25-year-logo.svg"
  # Meta data
  description = "Site Description here"
  author = "Quintessence"
  # Contact Information
  phone = " "
  email = ""
  address = ""
  googleMapLocation = ""
  disallowSearchEngines = true
  # Google Analitycs
  googleAnalytics = " " # Your ID# search 
  minifyBundles = true

# add redirects/headers
  [outputs]
  home = ["HTML", "RSS", "REDIRECTS", "HEADERS"]

# remove .{ext} from text/netlify
[mediaTypes."text/netlify"]
  suffixes = [""]
  delimiter = ""

# add output format for netlify _redirects
[outputFormats.REDIRECTS]
  mediatype = "text/netlify"
  baseName = "_redirects"
  isPlainText = true
  notAlternative = true

# add output format for netlify _headers
[outputFormats.HEADERS]
  mediatype = "text/netlify"
  baseName = "_headers"
  isPlainText = true
  notAlternative = true

[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5

[markup.goldmark.renderer]
  unsafe= true

[[menu.main]]
    name = "Capabilities"
    url  = "/capabilities/"
    weight = 1

[[menu.main]]
    name = "Equipment"
    url  = "/equipment/"
    weight = 2

[[menu.main]]
    name = "Industries"
    url  = "/industries/"
    weight = 3

[[menu.main]]
    name = "About"
    url  = "/about/"
    weight = 4

[[menu.main]]
    name = "Careers"
    url  = "/careers/"
    weight = 5

[[menu.main]]
    name = "Contact"
    url  = "/contact/"
    weight = 6