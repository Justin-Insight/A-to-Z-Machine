{{ define "main" }}

{{ if .Params.hero }}
  {{ with .Params.hero }}
    {{ partial "hero-split" . }}
  {{ end }}
{{ end }}

<section class="block">
  <div class="grid-3 wrapper-lg">
    {{ $paginator := .Paginate ( where .Data.Pages "Type" "blog" ) }}
    {{ range $paginator.Pages }}
    {{ .Render "article" }}
    {{ end }}
  </div>
  <div class="wrapper-lg">
    {{ partial "blog/custom-pagination.html" . }}
  </div>
</section>
{{ end }}
