{{- if isset site.Taxonomies "categories" }}
{{- if not (eq (len site.Taxonomies.categories) 0) }}
<ul class="category-list flex flex-column flex-row-m flex-justify-around">
{{- range .Site.Taxonomies.categories }}
<li class="category-list__item"><a href="{{ .Page.Permalink }}" class="btn btn-primary--rev category-list__link">{{ .Page.Title }}<span class="ml-2"> ({{ .Count }})</span></a></li>
{{- end }}
</ul>
{{- end }}
{{- end }}
