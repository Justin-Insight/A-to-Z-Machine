{{ if or .PrevInSection .NextInSection }}
    <div class="post-navigation flex flex-row flex-justify-between">
        <div class="post-navigation__prev">
            {{ with .PrevInSection }}
            <a href="{{ .Permalink }}" class="post-navigation__link">Previous Post</a>
            {{ end }}
        </div>
        <div class="post-navigation__next">
            {{ with .NextInSection }}
            <a href="{{ .Permalink }}" class="post-navigation__link">Next Post</a>
            {{ end }}
        </div>
    </div>
{{ end }}
