<section class="testimonials block" aria-label="Testimonial Slider">
    <div class="wrapper-lg padding-top-10">
        <div class="slider">
            <div role="status" aria-live="assertive" class="visually-hidden"></div>
            <div class="slider__wrapper">
                <div class="slider__content">
                    {{ range .Params.testimonials.testimonial }}
                    <div class="slider__slide is-selected">
                        <div class="slider__quote">
                            {{ partial "svg-icons/quote.svg" . }}
                        </div>
                        <div class="slider__slide-content flow">
                            <p class="slider__testimonial">"{{ .body }}"</p>
                            <div class="slider__author">
                                {{ if .author }}
                                    <h3 class="h5 no-margin">{{ .author }}</h3>
                                {{ end }}
                                {{ if .job_title }}
                                <span class="no-margin">{{ .job_title }}</span>
                                {{ end }}
                            </div>
                        </div>
                    </div>
                    {{ end }}
                </div>
            </div>
            <!-- <div class="slider__dots">
                <button class="slider__dot is-selected" aria-label="slider control"></button>
                <button class="slider__dot" aria-label="slider control"></button>
                <button class="slider__dot" aria-label="slider control"></button>
            </div> -->
        </div>
    </div>
</section>
