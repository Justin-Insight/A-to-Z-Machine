{{ if or .PrevInSection .NextInSection }}
    <div class="post-navigation equipment-navigation flex flex-row flex-justify-between">
        <div class="post-navigation__prev">
            {{ with .PrevInSection }}
            <a href="{{ .Permalink }}" class="post-navigation__link"><span>Previous</span><br>{{ .Title }}</a>
            {{ end }}
        </div>
        <div class="post-navigation__next">
            {{ with .NextInSection }}
            <a href="{{ .Permalink }}" class="post-navigation__link"><span>Next</span><br>{{ .Title }}</a>
            {{ end }}
        </div>
    </div>
{{ end }}
