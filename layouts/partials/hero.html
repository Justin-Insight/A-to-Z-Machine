{{ $heroClass := lower .Page.Title }}
<section class="{{ anchorize $heroClass }}-hero">
  {{ partial "hero-image" . }}
  <div class="block w-100">
    <div class="wrapper-sm">
      <h1 class="no-margin text-center">
        {{ .heading | markdownify }}
      </h1>
      <p>{{ .body | markdownify }}</p>
      <div class="text-center">
        <a href="/request-a-quote/" class="btn btn-primary">Request a Quote</a>
      </div>
    </div>
  </div>
</section>
