<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>{{ if .Params.seo.title }}{{ .Params.seo.title | markdownify }}{{ else }}{{ .Title }}{{ end }} | {{ .Site.Title }}</title>
    
    <meta property="og:site_name" content="{{ .Site.Title }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ if .Params.seo.title }}{{ .Params.seo.title  | markdownify }}{{ else }}{{ .Title }}{{ end }} | {{ .Site.Title }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:locale" content="en_US">
    <meta property="og:image" content="{{ if .Params.seo.featured_image }}https://res.cloudinary.com/atozmachine/image/upload{{ .Params.seo.featured_image }}{{ end }}">
    <meta property="og:description" content="{{ .Params.seo.description }}">
    <meta name="description" content="{{ .Params.seo.description }}">

    <link rel="canonical" href="{{ .Permalink }}">

    <meta property="twitter:card" content="summary">
    <meta property="twitter:url" content="{{ .Permalink }}">
    <meta property="twitter:title" content="{{ .Params.seo.title }}">
    <meta property="twitter:description" content="{{ .Params.seo.description }}">
    <meta property="twitter:site" content="@">
    <meta property="twitter:image" content="{{ if .Params.seo.featured_image }}https://res.cloudinary.com/atozmachine/image/upload{{ .Params.seo.featured_image }}{{ end }}">

    {{ with resources.Get "scss/main.scss" | css.Sass | css.PostCSS | minify }}
    <style>{{ .Content | safeCSS }}</style>
    {{ end }}

    <link rel="preconnect" href="https://www.google-analytics.com">
    
    <link rel="stylesheet" href="https://use.typekit.net/ulp1qqb.css">

    <link rel="icon" href="/images/favicon.svg">
    <link rel="mask-icon" href="mask-icon.svg" color="#000000">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="stylesheet" href="https://unpkg.com/swiper@7/swiper-bundle.min.css" />

    <script defer src="/plugins/photoswipe/js/photoswipe.min.js"></script>
    <script defer src="/plugins/photoswipe/js/photoswipe-ui-default.min.js"></script>

    <script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>

    {{ if hugo.IsProduction }}
    {{ template "_internal/google_analytics.html" . }}
    <script async src='https://tag.simpli.fi/sifitag/dd699df0-18ec-0136-ccf0-06a9ed4ca31b'></script>
    {{ end }}

    <!-- JSON-LD markup generated by Google Structured Data Markup Helper. -->
    <script type="application/ld+json">
      {
        "@context" : "http://schema.org",
        "@type" : "LocalBusiness",
        "name" : "A to Z Machine Company",
        "image" : "https://www.atozmachine.com/images/a-to-z-25-year-logo.svg",
        "telephone" : "920-993-0640",
        "email" : "",
        "address" : {
          "@type" : "PostalAddress",
          "streetAddress" : "2701 E. Winslow Ave.",
          "addressLocality" : "Appleton",
          "addressRegion" : "WI",
          "addressCountry" : "US",
          "postalCode" : "54911"
        }
      }
    </script>

    <link rel="stylesheet" href="/plugins/photoswipe/photoswipe.css">

</head>
