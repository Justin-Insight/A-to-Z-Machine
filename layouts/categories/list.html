{{ define "main" }}
<div class="post-hero"></div>
<div class="bg-black block">
  <div class="wrapper">
    {{ partial "blog/category-list" . }}
  </div>
</div>
<section class="block">
  <div class="grid-3 wrapper-lg">
    {{ $paginator := .Paginate ( where .Data.Pages "Type" "blog" ) }}
    {{ range $paginator.Pages }}
    {{ .Render "article" }}
    {{ end }}
  </div>
  <div class="wrapper-lg">
    {{ partial "blog/custom-pagination.html" . }}
  </div>
</section>
{{ end }}
