<!DOCTYPE html>
<html lang="en">
{{ block "head" . }}{{ partial "head" . }}{{ end }}
{{ $namespace := lower .Page.Title }}
{{ $mainClass := lower .Page.Title }}

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T3T3N6G2"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div class="site-wrap">
    {{ block "header" . }}{{ partial "header" . }}{{end}}
    <main id="main-content" class="site-main {{ .Params.page_class }} {{ anchorize $mainClass }}">
      {{ block "main" . }}{{ end }}
      {{ block "footer" . }}{{ partial "footer" . }}{{end}}
    </main>
  </div>
</body>

</html>
