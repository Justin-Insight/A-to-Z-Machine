{{ define "main" }}
<div class="block">
    <div class="wrapper-sm flow">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
    </div>
</div>
<div class="pb-10">
    <div class="wrapper-sm flex">
        <div class="w-100 w-50-m signature">
            <h2 class="h5">Authorized Signature</h2>
        </div>
        <div class="w-100 w-50-m signature">
            <h2 class="h5">Date Signed</h2>
        </div>
    </div>
</div>
{{ end }}
